global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: aiengineer-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: aiengineer-api
    # If you set METRICS_TOKEN on the API (recommended if /metrics is reachable
    # beyond localhost), uncomment and paste the same value here:
    # authorization:
    #   type: Bearer
    #   credentials: "REPLACE_WITH_METRICS_TOKEN"
