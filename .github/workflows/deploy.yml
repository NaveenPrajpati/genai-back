name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you trigger a deploy manually from the Actions tab

concurrency:
  group: deploy-ec2       # never run two deploys at once
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true   # abort on first failing command
          script: |
            set -e
            cd ~/aiserver/genai-back
            git pull origin main
            .venv/bin/pip install -r requirements.txt
            sudo systemctl restart aiengineer
            sleep 3
            sudo systemctl is-active aiengineer
